name: Build macOS Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "data/**"
      - "packaging/macos/**"
      - "gateway.py"
      - "build_macos_app.sh"
      - "build_macos_pkg.sh"
      - "build_macos_all.sh"
      - ".github/workflows/build-macos.yml"

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Environment info
        run: |
          sw_vers
          python3 --version
          xcode-select -p
          command -v pkgbuild

      - name: Prepare build scripts
        run: chmod +x build_macos_app.sh build_macos_pkg.sh build_macos_all.sh packaging/macos/scripts/preinstall packaging/macos/scripts/postinstall

      - name: Build macOS app
        run: |
          mkdir -p release/macos
          set +e
          ./build_macos_app.sh > release/macos/build-app.log 2>&1
          status=$?
          if [ -f release/macos/build-app.log ]; then
            cat release/macos/build-app.log
          fi
          if [ "$status" -ne 0 ]; then
            echo "### Build macOS app failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            if [ -f release/macos/build-app.log ]; then
              tail -n 120 release/macos/build-app.log >> "$GITHUB_STEP_SUMMARY"
            else
              echo "build-app.log was not created." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if [ -f release/macos/build-app.log ]; then
              message="$(tail -n 20 release/macos/build-app.log | tr '\r\n' '  ' | sed 's/  */ /g' | cut -c1-8000)"
            else
              message="build-app.log was not created."
            fi
            echo "::error::$message"
            exit "$status"
          fi

      - name: Run self-check
        run: ./release/macos/dist/TEM8Practice.app/Contents/MacOS/TEM8Practice --self-check-json | tee ./release/macos/self-check.json

      - name: Build macOS pkg
        run: |
          set -o pipefail
          ./build_macos_pkg.sh 2>&1 | tee release/macos/build-pkg.log

      - name: Pack artifacts
        run: |
          mkdir -p release/macos/artifacts
          ditto -c -k --sequesterRsrc --keepParent "release/macos/dist/TEM8Practice.app" "release/macos/artifacts/TEM8Practice.app.zip"
          cp "release/macos/TEM8Practice-macOS.pkg" "release/macos/artifacts/"
          cp "release/macos/self-check.json" "release/macos/artifacts/"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TEM8Practice-macos-diagnostics
          path: |
            release/macos/build-app.log
            release/macos/build-pkg.log
            release/macos/self-check.json
          if-no-files-found: warn

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TEM8Practice-macos
          path: release/macos/artifacts/*
          if-no-files-found: error
