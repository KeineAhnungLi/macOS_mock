name: Build macOS Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "data/**"
      - "packaging/macos/**"
      - "gateway.py"
      - "build_macos_app.sh"
      - "build_macos_pkg.sh"
      - "build_macos_all.sh"
      - ".github/workflows/build-macos.yml"

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare build scripts
        run: chmod +x build_macos_app.sh build_macos_pkg.sh build_macos_all.sh packaging/macos/scripts/preinstall packaging/macos/scripts/postinstall

      - name: Build macOS app
        run: ./build_macos_app.sh

      - name: Run self-check
        run: ./release/macos/dist/TEM8Practice.app/Contents/MacOS/TEM8Practice --self-check-json > ./release/macos/self-check.json

      - name: Build macOS pkg
        run: ./build_macos_pkg.sh

      - name: Pack artifacts
        run: |
          mkdir -p release/macos/artifacts
          ditto -c -k --sequesterRsrc --keepParent "release/macos/dist/TEM8Practice.app" "release/macos/artifacts/TEM8Practice.app.zip"
          cp "release/macos/TEM8Practice-macOS.pkg" "release/macos/artifacts/"
          cp "release/macos/self-check.json" "release/macos/artifacts/"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TEM8Practice-macos
          path: release/macos/artifacts/*
          if-no-files-found: error
